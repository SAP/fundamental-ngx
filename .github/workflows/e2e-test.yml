name: E2E Tests

on:
    pull_request:
        paths:
            - 'libs/core/**'
            - 'libs/platform/**'
            - 'libs/cdk/**'
            - 'apps/e2e-harness/**'
            - 'playwright.config.ts'

permissions:
    contents: read

env:
    NODE_VERSION: '22.x'

concurrency:
    group: e2e-${{ github.event.number || github.ref }}
    cancel-in-progress: true

jobs:
    e2e:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        name: Playwright E2E Tests
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
              with:
                  ref: ${{ github.head_ref }}
                  fetch-depth: 1

            - uses: ./.github/actions/nodejs
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Install Playwright browsers
              run: npx playwright install chromium --with-deps

            - name: Run E2E tests
              run: npx playwright test
              env:
                  CI: true

            - name: Commit missing Linux baselines
              if: failure() && github.event.pull_request.head.repo.full_name == github.repository
              run: |
                  SNAPDIR="apps/e2e-harness/e2e/visual-regression.spec.ts-snapshots"
                  MISSING=false
                  for f in test-results/**/*-actual.png; do
                    [ -f "$f" ] || continue
                    NAME=$(basename "$f" | sed 's/-actual\.png/-chromium-linux.png/')
                    if [ ! -f "$SNAPDIR/$NAME" ]; then
                      cp "$f" "$SNAPDIR/$NAME"
                      MISSING=true
                    fi
                  done
                  if [ "$MISSING" = "true" ]; then
                    git config user.name "github-actions"
                    git config user.email "github-actions@github.com"
                    git add "$SNAPDIR"/*-linux.png
                    git commit -m "test(e2e): add missing Linux visual baselines"
                    git push
                  fi

            - name: Upload test results
              if: failure()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7

            - name: Upload snapshot diffs
              if: failure()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: snapshot-diffs
                  path: test-results/
                  retention-days: 7
