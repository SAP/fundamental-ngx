name: i18n Auto-Generate TypeScript Files

on:
    pull_request_target:
        paths:
            - 'libs/i18n/src/lib/translations/*.properties'

env:
    NODE_VERSION: '22.x'

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    auto_generate:
        name: Generate TypeScript files from .properties changes
        runs-on: ubuntu-latest
        timeout-minutes: 10
        environment: i18n-automation
        permissions:
            contents: write
            pull-requests: write
        # Security: Only run for same-repo PRs or trusted translation bot (service-tip-git)
        if: |
            github.event.pull_request.head.repo.full_name == github.repository ||
            github.event.pull_request.head.repo.owner.login == 'service-tip-git'
        steps:
            # Same-repo PRs: checkout the branch by name so we can push back
            - name: Checkout PR branch (same-repo)
              if: github.event.pull_request.head.repo.full_name == github.repository
              uses: actions/checkout@v4.2.2
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  token: ${{ secrets.GHACTIONS }}
                  fetch-depth: 0

            # Fork PRs: checkout the PR head SHA (detached HEAD is fine, we push via API)
            - name: Checkout PR code (fork)
              if: github.event.pull_request.head.repo.full_name != github.repository
              uses: actions/checkout@v4.2.2
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
                  token: ${{ secrets.GHACTIONS }}
                  fetch-depth: 0

            # Security: Validate fork PRs only modify translation files (after checkout)
            - name: Validate translation-only changes (fork PRs)
              if: github.event.pull_request.head.repo.full_name != github.repository
              env:
                  BASE_REF: ${{ github.event.pull_request.base.ref }}
              run: |
                  echo "🔍 Validating fork PR only modifies .properties translation files..."

                  # Fetch base branch for comparison
                  git fetch origin "$BASE_REF"

                  # Get list of changed files (using two-dot diff for direct comparison)
                  FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD")

                  echo "Files changed in this PR:"
                  echo "$FILES"
                  echo ""

                  # Validate file paths - only .properties files in translations directory are allowed for fork PRs
                  INVALID_FILES=""
                  for file in $FILES; do
                      if [[ ! "$file" =~ ^libs/i18n/src/lib/translations/[^/]+\.properties$ ]]; then
                          INVALID_FILES="$INVALID_FILES\n  - $file"
                      fi
                  done

                  if [ -n "$INVALID_FILES" ]; then
                      echo "❌ ERROR: Fork PR modifies files other than .properties translation files:"
                      echo -e "$INVALID_FILES"
                      echo ""
                      echo "For security reasons, fork PRs can only modify .properties files in:"
                      echo "  libs/i18n/src/lib/translations/"
                      exit 1
                  fi

                  echo "✅ Path validation passed"
                  echo ""

            # Security: Validate file sizes and content (fork PRs only)
            - name: Validate file sizes and content (fork PRs)
              if: github.event.pull_request.head.repo.full_name != github.repository
              run: |
                  echo "🔍 Validating file sizes and content..."

                  # Check file sizes (500KB limit)
                  LARGE_FILES=$(find libs/i18n/src/lib/translations -name "*.properties" -size +500k)
                  if [ -n "$LARGE_FILES" ]; then
                      echo "❌ ERROR: .properties files exceed 500KB limit:"
                      echo "$LARGE_FILES"
                      exit 1
                  fi
                  echo "✅ File size validation passed"
                  echo ""

            - name: Setup Node.js
              uses: ./.github/actions/nodejs
              with:
                  node-version: ${{ env.NODE_VERSION }}

            # Security: Run syntax validation before generation (fork PRs only)
            - name: Validate .properties syntax (fork PRs)
              if: github.event.pull_request.head.repo.full_name != github.repository
              run: |
                  echo "🔍 Validating .properties file syntax..."
                  npx nx run i18n:i18n-manage --command=validate
                  echo "✅ Syntax validation passed"
                  echo ""

            - name: Setup git user
              uses: ./.github/actions/set-up-git
              with:
                  name: ${{ secrets.GH_NAME }}
                  email: ${{ secrets.GH_EMAIL }}

            - name: Generate TypeScript files
              id: generate
              run: |
                  echo "🔧 Generating TypeScript translation files from .properties changes..."
                  if ! npx nx run i18n:i18n-manage --command=sync; then
                      echo "❌ Sync failed"
                      exit 1
                  fi
                  echo "✅ Generation completed"

            - name: Check for changes
              id: git-check
              run: |
                  if git diff --quiet -- libs/i18n/src/lib/translations/; then
                      echo "changed=false" >> $GITHUB_OUTPUT
                  else
                      echo "changed=true" >> $GITHUB_OUTPUT
                  fi

            # Same-repo PRs: commit and push directly to the branch
            - name: Commit and push (same-repo PRs)
              if: steps.git-check.outputs.changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
              run: |
                  set -e
                  git add libs/i18n/src/lib/translations/

                  if ! git commit -m "chore(i18n): auto-generate TypeScript files from .properties changes

                  Generated by i18n-auto-generate workflow"; then
                      echo "❌ Commit failed"
                      exit 1
                  fi

                  if ! git push; then
                      echo "❌ Push failed - possible conflict or network issue"
                      exit 1
                  fi

                  echo "✅ Changes committed and pushed successfully"

            # Fork PRs: commit locally, then push to the fork via GHACTIONS PAT
            # Security: fork repo name and branch ref are passed via env vars (not
            # interpolated into the shell script) to prevent injection attacks from
            # crafted branch names or repo names.
            - name: Commit and push (fork PRs)
              if: steps.git-check.outputs.changed == 'true' && github.event.pull_request.head.repo.full_name != github.repository
              env:
                  FORK_REPO: ${{ github.event.pull_request.head.repo.full_name }}
                  FORK_REF: ${{ github.event.pull_request.head.ref }}
                  GHACTIONS_TOKEN: ${{ secrets.GHACTIONS }}
              run: |
                  set -e

                  # Validate ref name: only allow safe characters (alphanumeric, -, _, ., /)
                  # Also reject ".." sequences for defense in depth
                  if [[ ! "$FORK_REF" =~ ^[a-zA-Z0-9._/-]+$ ]] || [[ "$FORK_REF" == *..* ]]; then
                      echo "❌ ERROR: Branch ref contains invalid characters: $FORK_REF"
                      exit 1
                  fi

                  # Validate repo name: must be owner/repo format with safe characters
                  if [[ ! "$FORK_REPO" =~ ^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$ ]]; then
                      echo "❌ ERROR: Fork repo name has invalid format: $FORK_REPO"
                      exit 1
                  fi

                  git add libs/i18n/src/lib/translations/

                  if ! git commit -m "chore(i18n): auto-generate TypeScript files from .properties changes

                  Generated by i18n-auto-generate workflow"; then
                      echo "❌ Commit failed"
                      exit 1
                  fi

                  FORK_URL="https://x-access-token:${GHACTIONS_TOKEN}@github.com/${FORK_REPO}.git"
                  if ! git push "$FORK_URL" "HEAD:${FORK_REF}" 2>/dev/null; then
                      echo "❌ Push to fork failed - PAT may not have access to ${FORK_REPO}"
                      exit 1
                  fi

                  echo "✅ Changes committed and pushed to fork successfully"

            - name: Comment on PR
              if: steps.git-check.outputs.changed == 'true'
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      github.rest.issues.createComment({
                          issue_number: context.issue.number,
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          body: '✅ TypeScript translation files have been automatically generated and committed from your `.properties` file changes.'
                      })
