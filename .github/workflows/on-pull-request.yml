name: PR checks

on:
    pull_request:
        types: [opened, synchronize, edited]
    pull_request_target:
        types: [edited]

env:
    NODE_VERSION: '22.x'
    NX_CLOUD_DISTRIBUTED_EXECUTION: true
    NX_CLOUD_DISTRIBUTED_EXECUTION_AGENT_COUNT: 3
    NX_BRANCH: ${{ github.event.number || github.ref_name }}

concurrency:
    group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    pr_lint:
        runs-on: ubuntu-latest
        name: Lint PR title and body
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        permissions:
            pull-requests: write
            contents: read
        steps:
            - name: Check for BREAKING CHANGES (plural)
              uses: actions/github-script@v7
              with:
                  script: |
                      const pr = context.payload.pull_request;
                      const title = pr.title;
                      const body = pr.body || '';

                      // Only check for breaking change declarations, not mentions in descriptions
                      // Match the actual breaking change footer format
                      const breakingChangesRegex = /^BREAKING CHANGES:\s/m;
                      const breakingChangeRegex = /^BREAKING CHANGE:\s/m;

                      const hasBreakingChangesPlural = breakingChangesRegex.test(body);
                      const hasBreakingChange = breakingChangeRegex.test(body);

                      if (hasBreakingChangesPlural) {
                          const message = `⚠️ **Breaking Change Format Issue**

                      Your PR body contains \`BREAKING CHANGES:\` (plural), but the conventional-commits parser requires \`BREAKING CHANGE:\` (singular) for version bumping to work correctly.

                      Please update your PR description to use:
                      \`\`\`
                      BREAKING CHANGE: your description here
                      \`\`\`

                      Or use the \`!\` syntax in the PR title instead:
                      \`\`\`
                      ${title.replace(/^(\w+)(\([^)]+\))?:/, '$1$2!:')}
                      \`\`\``;

                          // Post a comment
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: pr.number,
                              body: message
                          });

                          // Fail the check
                          core.setFailed('PR body contains "BREAKING CHANGES:" (plural). Use "BREAKING CHANGE:" (singular) instead.');
                      } else {
                          core.info('✓ No breaking change format issues detected');
                      }

    nx_agents:
        name: Nx Cloud Agent ${{ matrix.agent }}
        runs-on: ubuntu-latest
        environment: ci
        env:
            NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_AUTH_TOKEN }}
        timeout-minutes: 60
        permissions:
            contents: read
        strategy:
            matrix:
                agent: [1, 2, 3]
        steps:
            - uses: actions/checkout@v4.2.2
              with:
                  fetch-depth: 1 # Shallow clone for agents (they don't need git history)
            - uses: ./.github/actions/nodejs
              with:
                  node-version: ${{ env.NODE_VERSION }}
            - name: set up xvfb
              run: |
                  export DISPLAY=:99
                  sudo Xvfb -ac :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
            - name: Start Nx Cloud Agent
              run: npx nx-cloud start-agent
              env:
                  NX_AGENT_NAME: ${{matrix.agent}}

    build_test:
        runs-on: ubuntu-latest
        name: Run affected Build, Lint and test commands
        environment: ci
        env:
            NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_AUTH_TOKEN }}
        permissions:
            contents: read
            pull-requests: read
        defaults:
            run:
                working-directory: ${{ github.workspace }}
                shell: bash
        steps:
            - uses: actions/checkout@v4.2.2
              name: Checkout
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
                  fetch-depth: 0

            - uses: nrwl/nx-set-shas@v4.3.0
              name: Derive appropriate SHAs for base and head for nx-affected commands
              with:
                  main-branch-name: main

            - uses: ./.github/actions/nodejs
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Initialize the Nx Cloud distributed CI run
              run: npx nx-cloud start-ci-run

            - name: Format Check
              run: npx prettier . --check
              env:
                  NX_CLOUD_DISTRIBUTED_EXECUTION: false

            - uses: wagoid/commitlint-github-action@v6.1.2
              name: Commit lint

            - name: Generate ui5-webcomponents wrappers
              run: npx nx run-many --target=generate --projects=ui5-webcomponents,ui5-webcomponents-ai,ui5-webcomponents-fiori,ui5-webcomponents-base
              env:
                  NX_CLOUD_DISTRIBUTED_EXECUTION: false

            - name: Run Build, Lint and test commands
              uses: ./.github/actions/parallel-commands
              with:
                  parallel-commands: |
                      npx nx affected --target=build --base=origin/${{ github.event.pull_request.base.ref }} --head=HEAD --exclude=docs,e2e-harness --parallel=1
                      npx nx run-many --target=test --all --skip-nx-cache --base=origin/${{ github.event.pull_request.base.ref }} --head=HEAD --exclude=nx-plugin --parallel=1
                      npx nx affected --target=lint --base=origin/${{ github.event.pull_request.base.ref }} --head=HEAD --exclude=core,platform,cx,btp --parallel=1

            - name: Build e2e-harness (non-DTE; needs generated ui5 sources locally)
              run: npx nx run e2e-harness:build:development
              env:
                  NX_CLOUD_DISTRIBUTED_EXECUTION: false

            - name: Text workspace tags
              run: npx nx run nx-plugin:test --skip-nx-cache

            # Stop NX Cloud agents immediately if any step fails
            # This prevents agents from running indefinitely when the main job fails
            - name: Stop Nx Cloud agents on failure
              if: failure()
              run: npx --yes nx-cloud@latest stop-all-agents
              env:
                  NX_CLOUD_AUTH_TOKEN: ${{ secrets.NX_CLOUD_AUTH_TOKEN }}

