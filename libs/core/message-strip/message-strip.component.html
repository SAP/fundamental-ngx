@if (shouldShowIcon()) {
    <div class="fd-message-strip__icon-container" aria-hidden="true">
        @if (icon()) {
            <ng-template [ngTemplateOutlet]="icon()!.templateRef"></ng-template>
        } @else {
            <fd-icon [glyph]="typeSpecificIconName()" role="presentation" aria-hidden="true"></fd-icon>
            <span class="fd-message-strip__sr-only" id="{{ id() }}-hidden-text">{{ messageStripHiddenText() }}</span>
        }
    </div>
}
<p class="fd-message-strip__text" id="{{ id() }}-content-text">
    <ng-content></ng-content>
</p>
@if (dismissible()) {
    <button
        class="fd-message-strip__close"
        fd-button
        glyph="decline"
        fdType="transparent"
        fdCompact
        (click)="dismiss()"
        [attr.aria-controls]="id()"
        [ariaLabel]="dismissBtnTitle() || defaultDismissButtonText()"
        [attr.title]="dismissBtnTitle() || defaultDismissButtonText()"
    ></button>
}
