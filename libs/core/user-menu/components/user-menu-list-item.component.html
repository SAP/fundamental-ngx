@if (hasSubmenu()) {
    @if (mobile()) {
        <button
            role="menuitem"
            class="fd-menu__link"
            [class.is-selected]="selected()"
            [tabIndex]="_tabIndex$()"
            (click)="onShowDetailsView()"
        >
            @if (icon()) {
                <span class="fd-menu__addon-before">
                    <i [class]="'sap-icon--' + icon()" role="presentation"></i>
                </span>
            }

            <div class="fd-menu__content">
                <span class="fd-menu__title" [class.fd-menu__title--truncate]="truncateText()" [id]="textId()">{{
                    text()
                }}</span>
                @if (subtitle()) {
                    <span
                        class="fd-menu__subtitle"
                        [class.fd-menu__subtitle--truncate]="truncateSubtitle()"
                        [id]="subtitleId()"
                        >{{ subtitle() }}</span
                    >
                }
            </div>

            @if (iconAfter()) {
                <span class="fd-menu__addon-after" [class.fd-menu__addon-after--active]="iconAfterActive()">
                    <i [class]="'sap-icon--' + iconAfter()" role="presentation"></i>
                </span>
            }

            <span class="fd-menu__addon-after fd-menu__addon-after--submenu"></span>
        </button>
    } @else {
        <fd-popover
            #popover
            [noArrow]="true"
            style="width: 100%"
            placement="left-start"
            [focusTrapped]="true"
            [focusAutoCapture]="false"
            [restoreFocusOnClose]="true"
            [closeOnOutsideClick]="false"
            [isOpen]="isOpen()"
            (isOpenChange)="isOpenChangeHandle($event, popover)"
        >
            <fd-popover-control>
                <button
                    role="menuitem"
                    class="fd-menu__link fd-menu__link--popover"
                    [class.is-selected]="selected()"
                    [tabIndex]="_tabIndex$()"
                >
                    @if (icon()) {
                        <span class="fd-menu__addon-before">
                            <i [class]="'sap-icon--' + icon()" role="presentation"></i>
                        </span>
                    }

                    <div class="fd-menu__content">
                        <span
                            class="fd-menu__title"
                            [class.fd-menu__title--truncate]="truncateText()"
                            [id]="textId()"
                            >{{ text() }}</span
                        >
                        @if (subtitle()) {
                            <span
                                class="fd-menu__subtitle"
                                [class.fd-menu__subtitle--truncate]="truncateSubtitle()"
                                [id]="subtitleId()"
                                >{{ subtitle() }}</span
                            >
                        }
                    </div>
                    @if (iconAfter()) {
                        <span class="fd-menu__addon-after" [class.fd-menu__addon-after--active]="iconAfterActive()">
                            <i [class]="'sap-icon--' + iconAfter()" role="presentation"></i>
                        </span>
                    }
                    <span class="fd-menu__addon-after fd-menu__addon-after--submenu"></span>
                </button>
            </fd-popover-control>
            <fd-popover-body
                (keydown)="onPopoverBodyKeyDown($event)"
                (mouseenter)="onSubmenuMouseEnter()"
                (mouseleave)="onSubmenuMouseLeave()"
            >
                <ng-container *ngTemplateOutlet="submenu()"></ng-container>
            </fd-popover-body>
        </fd-popover>
    }
} @else {
    <button role="menuitem" class="fd-menu__link" [class.is-selected]="selected()" [tabIndex]="_tabIndex$()">
        @if (icon()) {
            <span class="fd-menu__addon-before">
                <i [class]="'sap-icon--' + icon()" role="presentation"></i>
            </span>
        }

        <div class="fd-menu__content">
            <span class="fd-menu__title" [class.fd-menu__title--truncate]="truncateText()" [id]="textId()">{{
                text()
            }}</span>
            @if (subtitle()) {
                <span
                    class="fd-menu__subtitle"
                    [class.fd-menu__subtitle--truncate]="truncateSubtitle()"
                    [id]="subtitleId()"
                    >{{ subtitle() }}</span
                >
            }
        </div>

        @if (iconAfter()) {
            <span class="fd-menu__addon-after" [class.fd-menu__addon-after--active]="iconAfterActive()">
                <i [class]="'sap-icon--' + iconAfter()" role="presentation"></i>
            </span>
        }
    </button>
}
