<div class='fd-icon-tab-bar' [ngClass]='cssClassForContainer'>
    <ng-container *ngIf="type === 'text'">
        <ng-container *ngTemplateOutlet='textType'></ng-container>
    </ng-container>

    <ng-container *ngIf="type === 'icon' || type === 'icon-only'">
        <ng-container *ngTemplateOutlet='iconType'></ng-container>
    </ng-container>

    <ng-container *ngIf="type === 'filter'">
        <ng-container *ngTemplateOutlet='filterType'></ng-container>
    </ng-container>

    <ng-container *ngIf="type === 'process'">
        <ng-container *ngTemplateOutlet='processType'></ng-container>
    </ng-container>
</div>

<ng-template #processType>
    <ul class='fd-icon-tab-bar__header' role='tablist'>
        <li *ngFor='let item of items'
            [ngClass]='item.cssClasses'
            class='fd-icon-tab-bar__item'
            role='presentation'
        >
            <a
                aria-selected='true'
                class='fd-icon-tab-bar__tab'
                role='tab'
                [attr.aria-selected]='item.id === selectedItemId'
                (click)='selectItem(item)'
            >
                <ng-container *ngIf='item.icon; else processTextOnly'>
                    <div class="fd-icon-tab-bar__container">
                        <span class="fd-icon-tab-bar__icon">
                                <i class="{{'sap-icon--' + item.icon}}" role='presentation'></i>
                        </span>
                        <span *ngIf='item.badge' class="fd-icon-tab-bar__badge"></span>
                    </div>
                    <div class="fd-icon-tab-bar__details">
                        <span class="fd-icon-tab-bar__counter">{{item.counter}}</span>
                        <span class="fd-icon-tab-bar__label">{{item.label}}</span>
                    </div>
                </ng-container>
                <ng-template #processTextOnly>
                    <span class="fd-icon-tab-bar__tag">{{item.label}}</span>
                    <span *ngIf='item.badge' class="fd-icon-tab-bar__badge"></span>
                </ng-template>
            </a>
            <span class="fd-icon-tab-bar__separator">
                <i class="sap-icon--process" role="presentation"></i>
            </span>
        </li>
    </ul>
</ng-template>

<ng-template #filterType>
    <ul class='fd-icon-tab-bar__header' role='tablist'>
        <li *ngIf='showTabAll' role="presentation" class="fd-icon-tab-bar__item">
            <a role="tab"
               class="fd-icon-tab-bar__tab"
               [attr.aria-selected]='items[0]?.id === selectedItemId'
               (click)="selectItem(items[0])"
            >
                <div class="fd-icon-tab-bar__container fd-icon-tab-bar__container--filter">
                    <span *ngIf='items[0]?.counter' class="fd-icon-tab-bar__filter-counter">{{items[0]?.counter}}</span>
                    <span class="fd-icon-tab-bar__filter-label">{{items[0]?.label}}</span>
                </div>
            </a>
        </li>
            <li *ngFor='let item of items | slice:1'
                [ngClass]='item.cssClasses'
                class='fd-icon-tab-bar__item'
                role='presentation'
            >
                <a
                    aria-selected='true'
                    class='fd-icon-tab-bar__tab'
                    role='tab'
                    [attr.aria-selected]='item.id === selectedItemId'
                    (click)='selectItem(item)'
                >
                    <div class='fd-icon-tab-bar__container'>
                        <span class='fd-icon-tab-bar__icon'>
                            <i class="{{'sap-icon--' + item.icon}}" role='presentation'></i>
                        </span>
                        <span *ngIf='item.counter' class='fd-icon-tab-bar__counter'>{{item.counter}}</span>
                    </div>
                    <div class="fd-icon-tab-bar__label">{{item.label}}</div>
                </a>
            </li>
        </ul>
</ng-template>

<ng-template #iconType>
    <ul class='fd-icon-tab-bar__header' role='tablist'>
            <li *ngFor='let item of items'
                [ngClass]='item.cssClasses'
                class='fd-icon-tab-bar__item'
                role='presentation'
            >
                <a
                    aria-selected='true'
                    class='fd-icon-tab-bar__tab'
                    role='tab'
                    [attr.aria-selected]='item.id === selectedItemId'
                    (click)='selectItem(item)'
                >
                    <div class='fd-icon-tab-bar__container'>
                        <span class='fd-icon-tab-bar__icon'>
                            <i class="{{'sap-icon--' + item.icon}}" role='presentation'></i>
                        </span>
                        <span *ngIf='item.counter && !item.label' class='fd-icon-tab-bar__counter'>{{item.counter}}</span>
                    </div>
                    <div *ngIf='item.label' class="fd-icon-tab-bar__details">
                        <span class="fd-icon-tab-bar__counter">{{item.counter}}</span>
                        <span class="fd-icon-tab-bar__label">{{item.label}}</span>
                    </div>
                </a>
            </li>
        </ul>
</ng-template>

<ng-template #textType>
    <ul class='fd-icon-tab-bar__header' role='tablist'>
            <li *ngFor='let item of items' [ngClass]='item.cssClasses'
                class='fd-icon-tab-bar__item'
                role='presentation'
            >
                <a
                    (click)='selectItem(item)'
                    [attr.aria-selected]='item.id === selectedItemId'
                    class='fd-icon-tab-bar__tab'
                    role='tab'
                >
                    <span class='fd-icon-tab-bar__tag'>
                        {{ item.label }}
                        <ng-container *ngIf='item.counter'> ({{item.counter}})</ng-container>
                    </span>
                    <span *ngIf='item.badge' class='fd-icon-tab-bar__badge'></span>
                </a>
            </li>
        </ul>
</ng-template>
