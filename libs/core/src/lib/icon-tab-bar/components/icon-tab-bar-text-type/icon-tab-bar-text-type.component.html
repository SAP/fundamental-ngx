<ul
    class='fd-icon-tab-bar__header'
    role='tablist'
    fdOverflowItems
    itemSelector='.fd-icon-tab-bar__item'
    [offset]='100'
    (changed)='onChangeSize($event)'
>
    <li *ngFor='let item of items'
        [ngClass]='item.cssClasses'
        class='fd-icon-tab-bar__item'
        [attr.aria-hidden]='item.hidden'
        role='presentation'
    >
        <a
            class='fd-icon-tab-bar__tab'
            role='tab'
            *ngIf='!item.subItems'
            (click)='selectItem(item)'
            [attr.aria-selected]='item.id === selectedItemId'
        >
            <span class='fd-icon-tab-bar__tag'>
                {{ item.label }}
                <ng-container *ngIf='item.counter'> ({{item.counter}})</ng-container>
            </span>
            <span *ngIf='item.badge' class='fd-icon-tab-bar__badge'></span>
        </a>
        <ng-container *ngIf='item.subItems'>
            <ng-container [ngTemplateOutletContext]='{item: item}' [ngTemplateOutlet]='itemWithSubItems'></ng-container>
        </ng-container>
    </li>
</ul>

<ng-template #itemWithSubItems let-item='item'>
    <fd-popover [focusAutoCapture]='true' [focusTrapped]='true'>
        <fd-popover-control>
            <a
                aria-controls='popoverA1'
                aria-expanded='true'
                aria-haspopup='true'
                aria-selected='true'
                class='fd-icon-tab-bar__tab'
                role='tab'
                tabindex='0'>
                <div class='fd-icon-tab-bar__tab-container'>
                    <span class='fd-icon-tab-bar__tag'>{{item.label}}</span>
                    <span class='fd-icon-tab-bar__arrow'>
                        <i class='sap-icon--slim-arrow-down' role='presentation'></i>
                    </span>
                    <span *ngIf='item.badge' class='fd-icon-tab-bar__badge'></span>
                </div>
            </a>
        </fd-popover-control>
        <fd-popover-body>
            <ul class='fd-list fd-list--navigation fd-list--no-border fd-icon-tab-bar__list' role='list'>
                <ng-container [ngTemplateOutletContext]='{level: 1, items: items}'
                              [ngTemplateOutlet]='subItem'></ng-container>
            </ul>
        </fd-popover-body>
    </fd-popover>
</ng-template>

<ng-template #subItem let-items='items' let-level='level'>
    <ng-container *ngFor='let item of items'>
        <li [attr.aria-level]='level' class='fd-list__item fd-list__item--link fd-icon-tab-bar__list-item'
            role='listitem'
            tabindex='-1'>
            <a class='fd-list__link' tabindex='0'>
                <span class='fd-list__title'>{{item.label}}</span>
                <span *ngIf='item.badge' class='fd-icon-tab-bar__badge'></span>
            </a>
        </li>
        <ng-container *ngIf='item.subItems && item.subItems.length'>
            <ng-container [ngTemplateOutletContext]='{level: level + 1, items: item.subItems}'
                          [ngTemplateOutlet]='subItem'></ng-container>
        </ng-container>
    </ng-container>
</ng-template>
