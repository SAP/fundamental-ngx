<ul
    class="fd-icon-tab-bar__header"
    role="tablist"
    fdOverflowItems
    itemSelector='[data-overflowItem]'
    [offset]='100'
    (changed)='onChangeSize($event)'
>
    <li *ngFor="let item of items"
        [ngClass]="item.cssClasses"
        class="fd-icon-tab-bar__item"
        role="presentation"
        data-overflowItem
        [attr.aria-hidden]="item.hidden"
    >
        <a
            (click)="selectItem(item)"
            [attr.aria-selected]="item.id === selectedItemId"
            aria-selected="true"
            class="fd-icon-tab-bar__tab"
            role="tab"
        >
            <ng-container *ngIf="item.icon; else processTextOnly">
                <div class="fd-icon-tab-bar__container">
                    <span class="fd-icon-tab-bar__icon">
                                <i class="{{'sap-icon--' + item.icon}}" role="presentation"></i>
                    </span>
                    <span *ngIf="item.badge" class="fd-icon-tab-bar__badge"></span>
                </div>
                <div class="fd-icon-tab-bar__details">
                    <span class="fd-icon-tab-bar__counter">{{item.counter}}</span>
                    <span class="fd-icon-tab-bar__label">{{item.label}}</span>
                </div>
            </ng-container>
            <ng-template #processTextOnly>
                <span class="fd-icon-tab-bar__tag">{{item.label}}</span>
                <span *ngIf="item.badge" class="fd-icon-tab-bar__badge"></span>
            </ng-template>
        </a>
        <span class="fd-icon-tab-bar__separator">
            <i class="sap-icon--process" role="presentation"></i>
        </span>
    </li>
    <li
        *ngIf="extraItems.length"
        role="presentation"
        class="fd-icon-tab-bar__item fd-icon-tab-bar__item--extra-btn"
        fdExtraButton
        [lastVisibleItemIndex]="moreBtnOrder"
    >
        <ng-container [ngTemplateOutletContext]="{items: extraItems}" [ngTemplateOutlet]="popoverView"></ng-container>
    </li>
</ul>

<ng-template #popoverView let-items="items">
    <fd-popover [focusAutoCapture]="true" [focusTrapped]="true">
        <fd-popover-control>
            <button class="fd-icon-tab-bar__overflow">
                <span class="fd-icon-tab-bar__overflow-text">More</span>
                <i class="sap-icon--slim-arrow-down" role="presentation"></i>
            </button>
        </fd-popover-control>
        <fd-popover-body>
            <ul class="fd-list fd-list--navigation fd-list--no-border fd-icon-tab-bar__list" role="list">
                <li *ngFor="let item of items" class="fd-list__item fd-list__item--link fd-icon-tab-bar__list-item"
                    role="listitem"
                    [ngClass]="item.cssClasses"
                    tabindex="-1">
                    <a class="fd-list__link" tabindex="0">
                        <span class="fd-list__icon-container">
                            <span class="fd-list__icon">
                                <i class="{{'sap-icon--' + item.icon}}" role="presentation"></i>
                            </span>
                            <span *ngIf="item.badge" class="fd-icon-tab-bar__badge"></span>
                        </span>
                        <span *ngIf="item.label" class='fd-list__title'>{{item.label}}</span>
                        <span *ngIf="item.counter" class="fd-list__counter">({{item.counter}})</span>
                    </a>
                </li>
            </ul>
        </fd-popover-body>
    </fd-popover>
</ng-template>
