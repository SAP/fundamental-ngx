<div fd-popover-body-header>
    <div fd-bar barDesign="header">
        <div fd-bar-left>
            @if (_isDetailStage) {
                <fd-button-bar
                    (click)="openOverflowMain()"
                    [glyph]="navigationArrow()"
                    fdType="transparent"
                    [attr.aria-label]="('coreAvatarGroup.backButton' | fdTranslate)()"
                    [title]="('coreAvatarGroup.backButton' | fdTranslate)()"
                ></fd-button-bar>
            }
            <fd-bar-element
                ><span
                    class="fd-title"
                    [class]="'fd-title--h' + overflowHeadingLevel()"
                    role="heading"
                    [attr.aria-level]="overflowHeadingLevel()"
                >
                    {{ _isDetailStage ? _selectedItem.title : overflowPopoverTitle }}
                </span></fd-bar-element
            >
            @if (_isDetailStage) {
                <fd-bar-element>&nbsp;</fd-bar-element>
            }
        </div>
    </div>
</div>
<div
    class="fd-avatar-group__overflow-body"
    [class.fd-avatar-group__overflow-body--no-padding]="_isDetailStage"
    [class.fd-avatar-group__overflow-body--no-horizontal-scroll]="_isDetailStage"
    fdkFocusableList
    role="list"
    navigationDirection="horizontal"
>
    @if (_overflowPopoverStage === 'main') {
        @for (item of avatars; track item) {
            <ng-template
                cdkPortalOutlet
                fdAvatarGroupItemPortal
                [avatarGroupItem]="item.avatarGroupItem"
                [forceVisibility]="true"
                [posInSet]="item.posInSet"
                [setSize]="item.setSize"
            >
            </ng-template>
        }
    } @else {
        <ng-template [ngTemplateOutlet]="_selectedItem.details"></ng-template>
    }
</div>
