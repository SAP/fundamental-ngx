<h3 class="fd-docs-playground__title">Playground Example</h3>

<div class="fd-docs-playground__body" [class.fd-docs-playground__body--block]="displayBlock()">
    <div class="fd-docs-playground__col">
        <ng-content></ng-content>
    </div>

    <div class="fd-docs-playground__col">
        <schema
            class="fd-docs-playground__schema"
            [schema]="schema()"
            [resettable]="resettable()"
            [initialValues]="schemaInitialValues()"
            (schemaValues)="onSchemaValueChanges($event)"
            (resetTriggered)="reset()"
        ></schema>
    </div>
</div>
