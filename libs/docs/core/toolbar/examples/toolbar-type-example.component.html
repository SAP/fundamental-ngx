<fd-toolbar fdType="solid" ariaLabel="Solid Toolbar">
    <span fd-toolbar-label>Solid</span>
</fd-toolbar>
<br />

<fd-toolbar fdType="auto">
    <span fd-toolbar-label>Auto</span>
</fd-toolbar>
<br />

<fd-toolbar fdType="transparent" [clearBorder]="true" ariaLabelledBy="toolbar-example-label">
    <span fd-toolbar-label>Transparent</span>
</fd-toolbar>
<br />

<fd-toolbar fdType="info" ariaDescribedBy="toolbar-example-label">
    <span fd-toolbar-label>Info</span>
</fd-toolbar>
<br />

<fd-toolbar fdType="info" [active]="true">
    <span fd-toolbar-label>Info active</span>
</fd-toolbar>

<br /><br />
<label
    id="toolbar-example-label"
    style="
        clip: rect(0 0 0 0);
        clip-path: inset(50%);
        height: 1px;
        overflow: hidden;
        position: absolute;
        white-space: nowrap;
        width: 1px;
    "
>
    Toolbar Example
</label>
