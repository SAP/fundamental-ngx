<fd-datetime-picker [(ngModel)]="date" [customDateTimeFormat]="selectedFormat"></fd-datetime-picker>
<label fd-form-label id="format-select">Display format</label>
<fd-select
    [value]="selectedFormat"
    (valueChange)="onFormatChange($event)"
    ariaLabelledBy="format-select"
    class="fd-margin-bottom--sm"
>
    @for (option of formatOptions; track option.value) {
        <li fd-option [value]="option.value">
            {{ option.label }}
        </li>
    }
</fd-select>
