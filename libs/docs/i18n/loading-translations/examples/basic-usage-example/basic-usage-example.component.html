<div class="basic-usage-example">
    <div class="fd-margin-top--sm">
        <label fd-form-label>Select Language:</label>
        <fd-segmented-button [(ngModel)]="selectedLanguage" (ngModelChange)="changeLanguage($event)">
            <button fd-button label="English" value="english"></button>
            <button fd-button label="Українська (Ukrainian)" value="ukrainian"></button>
            <button fd-button label="Polski (Polish)" value="polish"></button>
            <button fd-button label="Français (French)" value="french"></button>
        </fd-segmented-button>
    </div>

    <!-- Show translated labels -->
    <div class="fd-margin-top--md">
        <label fd-form-label>Translated Labels from Built-in Languages:</label>
        <div class="fd-margin-top--sm">
            <div
                class="fd-padding--md fd-margin-bottom--md"
                style="border: 1px solid var(--sapGroup_ContentBorderColor)"
            >
                <code>coreDatePicker.dateInputLabel:</code>
                <div class="fd-margin-top--tiny" style="font-weight: bold">{{ dateInputLabel() }}</div>
            </div>

            <div
                class="fd-padding--md fd-margin-bottom--md"
                style="border: 1px solid var(--sapGroup_ContentBorderColor)"
            >
                <code>coreDatePicker.dateRangeInputLabel:</code>
                <div class="fd-margin-top--tiny" style="font-weight: bold">{{ dateRangeLabel() }}</div>
            </div>

            <div class="fd-padding--md" style="border: 1px solid var(--sapGroup_ContentBorderColor)">
                <code>Using in button:</code>
                <div class="fd-margin-top--sm">
                    <button fd-button [label]="('coreDatePicker.displayCalendarToggleLabel' | fdTranslate)()"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Interactive textarea showing counter translations -->
    <div class="fd-margin-top--md">
        <label fd-form-label for="textarea-basic-usage"
            >Platform Textarea (watch counter messages change with different languages):</label
        >
        <fdp-textarea
            [id]="'textarea-basic-usage'"
            name="textarea-basic-usage"
            [maxLength]="15"
            [showExceededText]="true"
            placeholder="Type to see counter messages..."
        >
        </fdp-textarea>
        <div class="fd-margin-top--sm" style="font-size: 0.875rem; color: var(--sapContent_LabelColor)">
            💡 <strong>Tip:</strong> Type text and switch between languages to see how the counter messages are
            automatically translated!
        </div>
    </div>
</div>
