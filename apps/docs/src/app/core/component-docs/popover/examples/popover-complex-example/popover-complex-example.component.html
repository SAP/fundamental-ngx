<div class="fd-docs-flex-display-helper">
    <fd-popover [focusTrapped]="true" [focusAutoCapture]="true">
        <fd-popover-control>
            <button fd-button label="Simple"></button>
        </fd-popover-control>
        <fd-popover-body>
            <ul fd-list>
                <li fd-list-item *ngFor="let option of list">
                    <a [attr.href]="option.url" fd-list-title>{{ option.text }}</a>
                </li>
            </ul>
        </fd-popover-body>
    </fd-popover>

    <fd-popover [focusTrapped]="true" [focusAutoCapture]="true">
        <fd-popover-control>
            <button fd-button label="With Header"></button>
        </fd-popover-control>
        <fd-popover-body>
            <ul fd-list>
				<li fd-list-group-header>
					<span fd-list-title>Cozy Header</span>
				</li>
                <li fd-list-item *ngFor="let option of list">
                    <a [attr.href]="option.url" fd-link fd-list-title>{{ option.text }}</a>
                </li>
            </ul>
        </fd-popover-body>
    </fd-popover>

    <fd-popover [focusTrapped]="true" [focusAutoCapture]="true">
        <fd-popover-control>
            <button fd-button label="With Header And Footer"></button>
        </fd-popover-control>
        <fd-popover-body>
            <ul fd-list>
				<li fd-list-group-header>
					<span fd-list-title>Cozy Header</span>
				</li>
                <li fd-list-item *ngFor="let option of list">
                    <a [attr.href]="option.url" fd-link fd-list-title>{{ option.text }}</a>
                </li>
            </ul>
            <div fd-popover-body-footer>
                <div fd-bar barDesign="footer" [cozy]="true">
                    <div fd-bar-right>
                        <fd-button-bar label="Save" fdType="emphasized"></fd-button-bar>
                        <fd-button-bar label="Cancel" fdType="standard"></fd-button-bar>
                    </div>
                </div>
            </div>
        </fd-popover-body>
    </fd-popover>

    <fd-popover [focusTrapped]="true" [focusAutoCapture]="true">
        <fd-popover-control>
            <button fd-button label="With Header, SubHeader And Footer"></button>
        </fd-popover-control>
        <fd-popover-body>
            <ul fd-list>
				<li fd-list-group-header>
					<span fd-list-title>Cozy Header</span>
				</li>
				<li fd-list-group-header>
					<span fd-list-title>Cozy SubHeader</span>
				</li>
                <li fd-list-item *ngFor="let option of list">
                    <a [attr.href]="option.url" fd-link fd-list-title>{{ option.text }}</a>
                </li>
			</ul>
            <div fd-popover-body-footer>
                <div fd-bar barDesign="footer" [cozy]="true">
                    <div fd-bar-right>
                        <fd-button-bar label="Save" fdType="emphasized"></fd-button-bar>
                        <fd-button-bar label="Cancel" fdType="standard"></fd-button-bar>
                    </div>
                </div>
            </div>
        </fd-popover-body>
    </fd-popover>
</div>
